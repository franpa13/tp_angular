<section class="w-full bg-gray-950">

  <!-- ── Carousel wrapper ── -->
  <div class="relative w-full overflow-hidden" style="height: 520px;">

    <!-- Slides: all rendered, fade between them via opacity -->
    @for (item of items; track item.id; let i = $index) {
      <div
        class="absolute inset-0 transition-opacity duration-700 ease-in-out"
        [class.opacity-100]="i === contador"
        [class.opacity-0]="i !== contador"
        [class.pointer-events-none]="i !== contador">

        <img
          class="w-full h-full object-cover"
          [src]="item.img"
          [alt]="item.name" />

        <!-- Bottom gradient overlay -->
        <div class="absolute inset-0 bg-linear-to-t from-black/85 via-black/25 to-transparent"></div>

        <!-- Text overlay -->
        <div class="absolute bottom-20 left-0 right-0 px-8 md:px-20 text-white">
          <h2 class="text-3xl md:text-4xl font-extrabold mb-3 drop-shadow-lg tracking-tight">
            {{ item.name }}
          </h2>
          <p class="text-sm md:text-base text-gray-200 max-w-2xl leading-relaxed">
            {{ item.description }}
          </p>
        </div>
      </div>
    }

    <!-- ── Slide counter badge ── -->
    <div class="absolute top-4 right-4 z-20 flex items-center gap-1.5 bg-black/40 text-white text-xs font-semibold px-3 py-1.5 rounded-full backdrop-blur-sm select-none">
      <span class="inline-block w-2 h-2 rounded-full bg-blue-400"></span>
      {{ contador + 1 }} / {{ items.length }}
    </div>

    <!-- ── Prev button ── -->
    <button
      type="button"
      (click)="moveImg(-1)"
      aria-label="Anterior"
      class="group absolute left-4 top-1/2 -translate-y-1/2 z-20 inline-flex items-center justify-center w-12 h-12 rounded-full bg-white/20 hover:bg-white/40 text-white backdrop-blur-sm ring-1 ring-white/30 transition-all duration-200 hover:scale-110 focus:outline-none focus:ring-2 focus:ring-white/60">
      <svg class="w-5 h-5 group-hover:-translate-x-0.5 transition-transform" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 6 10">
        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 1 1 5l4 4"/>
      </svg>
    </button>

    <!-- ── Next button ── -->
    <button
      type="button"
      (click)="moveImg(1)"
      aria-label="Siguiente"
      class="group absolute right-4 top-1/2 -translate-y-1/2 z-20 inline-flex items-center justify-center w-12 h-12 rounded-full bg-white/20 hover:bg-white/40 text-white backdrop-blur-sm ring-1 ring-white/30 transition-all duration-200 hover:scale-110 focus:outline-none focus:ring-2 focus:ring-white/60">
      <svg class="w-5 h-5 group-hover:translate-x-0.5 transition-transform" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 6 10">
        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 9 4-4-4-4"/>
      </svg>
    </button>

    <!-- ── Dot indicators ── -->
    <div class="absolute bottom-6 left-1/2 -translate-x-1/2 z-20 flex items-center gap-2">
      @for (item of items; track item.id; let i = $index) {
        <button
          type="button"
          (click)="goTo(i)"
          [attr.aria-label]="'Ir a slide ' + (i + 1)"
          [class]="i === contador
            ? 'w-7 h-2.5 bg-white rounded-full transition-all duration-300'
            : 'w-2.5 h-2.5 bg-white/50 hover:bg-white/80 rounded-full transition-all duration-300'">
        </button>
      }
    </div>

  </div>

  <!-- ── Caption bar ── -->
  <div class="bg-gray-900 flex items-center justify-center gap-3 py-3 text-gray-400 text-xs tracking-widest uppercase select-none">
    <svg class="w-4 h-4 text-blue-400 shrink-0" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/>
    </svg>
    Carrusel de Destinos Turísticos
  </div>

</section>
