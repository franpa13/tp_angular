<div class="flex justify-between items-center">
    <button class="bg-blue-400 hover:bg-blue-500 text-white font-bold py-2 px-4 rounded   " (click)="moveImg(-1)">Anterior</button>
    <div class="w-full flex items-center justify-center">
        <div>
            <img class="w-1/3" [src]="items[contador].img" [alt]="items[contador].name" />
            <h2>{{ items[contador].name }}</h2>
            <p>{{ items[contador].description }}</p>
        </div>
    </div>
    <button class="bg-blue-400 hover:bg-blue-500 text-white font-bold py-2 px-4 rounded   " (click)="moveImg(1)">Siguiente</button>
</div>
