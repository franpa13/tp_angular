<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo degradado futurista -->
  <defs>
    <linearGradient id="bluGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0047ab;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glowGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00ffff;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#0047ab;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Círculo de fondo -->
  <circle cx="50" cy="50" r="50" fill="url(#bluGradient)"/>
  
  <!-- Efecto de glow -->
  <circle cx="50" cy="50" r="45" fill="url(#glowGradient)"/>
  
  <!-- Hexágono central (símbolo futurista) -->
  <path d="M 50 20 L 70 30 L 70 50 L 50 60 L 30 50 L 30 30 Z" fill="none" stroke="#ffffff" stroke-width="2"/>
  
  <!-- Puntos interconectados (red/conexión) -->
  <circle cx="50" cy="35" r="2" fill="#ffffff"/>
  <circle cx="63" cy="42" r="2" fill="#ffffff"/>
  <circle cx="63" cy="58" r="2" fill="#ffffff"/>
  <circle cx="50" cy="65" r="2" fill="#ffffff"/>
  <circle cx="37" cy="58" r="2" fill="#ffffff"/>
  <circle cx="37" cy="42" r="2" fill="#ffffff"/>
  
  <!-- Líneas conectadas -->
  <line x1="50" y1="35" x2="63" y2="42" stroke="#00ffff" stroke-width="1" opacity="0.8"/>
  <line x1="63" y1="42" x2="63" y2="58" stroke="#00ffff" stroke-width="1" opacity="0.8"/>
  <line x1="63" y1="58" x2="50" y2="65" stroke="#00ffff" stroke-width="1" opacity="0.8"/>
  <line x1="50" y1="65" x2="37" y2="58" stroke="#00ffff" stroke-width="1" opacity="0.8"/>
  <line x1="37" y1="58" x2="37" y2="42" stroke="#00ffff" stroke-width="1" opacity="0.8"/>
  <line x1="37" y1="42" x2="50" y2="35" stroke="#00ffff" stroke-width="1" opacity="0.8"/>
  
  <!-- Centro brillante -->
  <circle cx="50" cy="50" r="6" fill="#00ffff" opacity="0.9"/>
  <circle cx="50" cy="50" r="4" fill="#ffffff"/>
</svg>